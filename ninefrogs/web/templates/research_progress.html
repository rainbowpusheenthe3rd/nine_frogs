{% extends "base.html" %}
{% block title %}Researching: {{ session.topic }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Researching</h1>
  <span class="topic-pill">{{ session.topic }}</span>
</div>

<div class="card research-card">
  <div class="research-status-bar">
    <span class="pulse-dot"></span>
    <span id="status-text" class="status-text">Connecting…</span>
  </div>

  <div id="event-log" class="event-log" role="log" aria-live="polite">
    <!-- SSE events appended here -->
  </div>

  <!-- LLM streaming panel — hidden until first token arrives -->
  <div id="llm-panel" class="llm-panel" style="display:none;">
    <div class="llm-panel-header">
      <span class="llm-panel-dot"></span>
      <span id="llm-panel-label" class="llm-panel-label">LLM reasoning…</span>
    </div>
    <pre id="llm-stream" class="llm-stream"></pre>
  </div>

  <div id="done-banner" class="done-banner" style="display:none;">
    <span class="done-icon">✓</span>
    Syllabus ready — redirecting…
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const SESSION_ID = "{{ session.id }}";
const log        = document.getElementById("event-log");
const statusText = document.getElementById("status-text");
const doneBanner = document.getElementById("done-banner");
const llmPanel   = document.getElementById("llm-panel");
const llmStream  = document.getElementById("llm-stream");
const llmLabel   = document.getElementById("llm-panel-label");

const ICONS = {
  status:    "◉",
  query:     "⟳",
  retrieved: "◎",
  done:      "✓",
  error:     "✗",
};

function appendLog(cls, html) {
  const el = document.createElement("div");
  el.className = `log-item ${cls}`;
  el.innerHTML = html;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}

const source = new EventSource(`/research/${SESSION_ID}/stream`);

source.onmessage = (e) => {
  const d = JSON.parse(e.data);
  const icon = ICONS[d.type] || "·";

  if (d.type === "wiki_loading") {
    appendLog("log-status",
      `<span class="log-icon">⧖</span> Knowledge base loading (${d.pct}%) — retrieval available once ready. ${d.message}`);

  } else if (d.type === "status") {
    statusText.textContent = d.message;
    appendLog("log-status", `<span class="log-icon">${icon}</span> ${d.message}`);

  } else if (d.type === "query") {
    appendLog("log-query",
      `<span class="log-icon">${icon}</span> <span class="log-label">SEARCH</span> ${d.query}`);

  } else if (d.type === "retrieved") {
    let titlesHtml = "";
    if (d.titles && d.titles.length) {
      const items = d.titles.map(t => `<span class="article-pill">${t}</span>`).join(" ");
      titlesHtml = `<div class="article-pills">${items}</div>`;
    }
    appendLog("log-retrieved",
      `<span class="log-icon">${icon}</span> <span class="log-label">FOUND</span> `+
      `<strong>${d.count}</strong> passages${titlesHtml}`);

  } else if (d.type === "stream_start") {
    llmStream.textContent = "";
    llmLabel.textContent = d.label || "LLM reasoning…";
    llmPanel.style.display = "block";
    log.scrollTop = log.scrollHeight;

  } else if (d.type === "token") {
    llmStream.textContent += d.text;
    llmStream.scrollTop = llmStream.scrollHeight;

  } else if (d.type === "stream_end") {
    llmLabel.textContent = "LLM reasoning — done";
    llmPanel.querySelector(".llm-panel-dot").classList.add("done");

  } else if (d.type === "done") {
    statusText.textContent = "Complete";
    doneBanner.style.display = "flex";
    source.close();
    setTimeout(() => { window.location.href = `/syllabus/${SESSION_ID}`; }, 1800);

  } else if (d.type === "error") {
    statusText.textContent = "Error";
    appendLog("log-error",
      `<span class="log-icon">✗</span> ${d.message}`);
    source.close();
  }
};

source.onerror = () => {
  statusText.textContent = "Connection lost — reload to retry";
};
</script>
{% endblock %}
